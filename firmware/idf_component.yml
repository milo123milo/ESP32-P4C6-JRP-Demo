## ESP-IDF managed-component dependencies for ESP32-P4C6 demo firmware.
dependencies:
  idf: ">=5.3.0"

  # CO5300 MIPI DSI round-display driver
  espressif/esp_lcd_co5300:
    version: "*"

  # LVGL graphics library (used by display_module for text + test pattern)
  lvgl/lvgl:
    version: ">=8.3.0,<9.0.0"

  # ESP-IDF LVGL port — ties LVGL to the esp_lcd panel API
  espressif/esp_lvgl_port:
    version: ">=2.3.0"
